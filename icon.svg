  <ellipse cx="352" cy="295" rx="20" ry="12" fill="#ffb0a0" opacity=".7"/>
  <!-- paw -->
  <g fill="#4a3b2a" opacity=".9">
    <circle cx="420" cy="425" r="20"/>
    <circle cx="393" cy="398" r="9"/><circle cx="414" cy="390" r="9"/><circle cx="436" cy="393" r="9"/><circle cx="451" cy="410" r="9"/>
