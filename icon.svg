<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="115" fill="#ffd66b"/>
  <!-- ears -->
  <ellipse cx="128" cy="185" rx="58" ry="92" fill="#b07b4f" transform="rotate(18 128 185)"/>
  <ellipse cx="384" cy="185" rx="58" ry="92" fill="#b07b4f" transform="rotate(-18 384 185)"/>
  <!-- head -->
  <circle cx="256" cy="270" r="150" fill="#e8b97e"/>
  <!-- muzzle -->
  <ellipse cx="256" cy="330" rx="86" ry="66" fill="#fff3dd"/>
  <!-- eyes -->
  <circle cx="203" cy="245" r="18" fill="#4a3b2a"/>
  <circle cx="309" cy="245" r="18" fill="#4a3b2a"/>
  <circle cx="209" cy="239" r="6" fill="#fff"/>
  <circle cx="315" cy="239" r="6" fill="#fff"/>
  <!-- nose -->
